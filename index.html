<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100vh; overflow: hidden;
            background: linear-gradient(135deg, #0c0c0c, #1a1a2e);
            color: #ffffff; font-family: 'Arial', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }
        #container { text-align: center; }
        #spinner {
            border: 6px solid rgba(255,255,255,0.1);
            border-top: 6px solid #4facfe; border-radius: 50%;
            width: 60px; height: 60px; animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #title { font-size: 32px; margin-bottom: 10px; color: #4facfe; }
        #subtitle { font-size: 20px; margin-bottom: 40px; opacity: 0.8; }
        #status { font-size: 18px; margin-bottom: 20px; }
        #progress-container {
            width: 400px; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 4px; margin: 0 auto 20px; overflow: hidden;
        }
        #progress {
            height: 100%; background: linear-gradient(90deg, #4facfe, #00f2fe);
            width: 0%; transition: width 0.3s ease;
        }
        #percent { font-size: 16px; opacity: 0.7; }
    </style>
</head>
<body>
    <div id="container">
        <div id="spinner"></div>
        <div id="title">Loading...</div>
        <div id="subtitle">Please wait</div>
        <div id="status">Connecting to server</div>
        <div id="progress-container">
            <div id="progress"></div>
        </div>
        <div id="percent">0%</div>
    </div>
    <script>
        let total = 0, needed = 0;

        window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language) {
            document.getElementById('title').textContent = 'Welcome to ' + servername;
            document.getElementById('subtitle').textContent = 'Loading ' + mapname + '...';
        };

        window.SetStatusChanged = function(status) {
            document.getElementById('status').textContent = status;
        };

        window.SetFilesTotal = function(t) {
            total = t;
            updateProgress();
        };

        window.SetFilesNeeded = function(n) {
            needed = n;
            updateProgress();
        };

        window.DownloadingFile = function(file) {
            updateProgress();
        };

        function updateProgress() {
            if (total === 0) return;
            const percent = Math.round((total - needed) / total * 100);
            document.getElementById('progress').style.width = percent + '%';
            document.getElementById('percent').textContent = percent + '%';
        }
    </script>
</body>
</html>
